name: CI + Deploy

on:
  push:
    branches: [main]  # ou ta branche principale

permissions:
  contents: write

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v3
        with:
          node-version: 18
      - run: npm install
      - run: npm test

  deploy:
    needs: ci
    if: ${{ needs.ci.result == 'success' }}  # ✅ déploiement seulement si CI OK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false  # nécessaire pour push
      - name: Build static site
        run: npm run build  # ton dossier de build, ex: dist/
      - name: Deploy to gh-pages branch
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -f dist/*
          git commit -m "Deploy from GitHub Actions" || echo "No changes to commit"
          git push origin `git subtree split --prefix dist main`:gh-pages --force